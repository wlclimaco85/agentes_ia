## Mapa de Roteamento por Tipo de Demanda

| Tipo de Demanda | Fase 1: Diagnóstico | Fase 2: Implementação |
|-----------------|--------------------|-----------------------|
| **Bug backend** | debugger + backend-spring (lê logs/stacktrace) | backend-spring → qa |
| **Bug frontend** | debugger + frontend-flutter (vê response/console) | frontend-flutter → qa |
| **Bug full-stack** | debugger + backend-spring + frontend-flutter | ambos em paralelo → qa |
| **Nova feature** | architect + product-owner | backend-spring + frontend-flutter → qa |
| **Bug UI/visual** | ui-ux-pro-max + frontend-flutter (vê screenshot) | frontend-flutter → qa |
| **Refactoring** | architect + code-reviewer | backend-spring ou frontend-flutter |
| **Deploy/CI/CD** | deployment-engineer | deployment-engineer + docs-devops-fastlane |
| **Pesquisa técnica** | technical-researcher + architect | — |

---

## Protocolo de Diagnóstico por Especialista

Ao chamar um especialista para DIAGNÓSTICO, inclua no prompt:

- O erro exato (body da resposta, stacktrace, log)
- Os arquivos suspeitos com linha aproximada
- O que já foi tentado e falhou
- Peça: **"Confirme a causa raiz antes de sugerir fix"**

Ao chamar um especialista para IMPLEMENTAÇÃO, inclua:

- A causa raiz já confirmada
- Os arquivos exatos a modificar
- O fix esperado (sem margem para interpretação)

---

## Formato de Resposta dos Especialistas

Cada especialista deve responder com:
- **Causa raiz confirmada** (não suspeita — verificada)
- **Abordagem/Solução** (com arquivos e linhas específicos)
- **Arquivos modificados**
- **Como validar** (como testar que funcionou)

---

## Commit Automático

backend-spring e frontend-flutter devem fazer commit+push ao terminar implementação, sem esperar instrução explícita.

---

## Exemplos de Fluxo Correto

### Bug: POST /api/forma_pagamento retorna 500

**ERRADO (o que não fazer):**
```
❌ Supor que é problema de status dropdown
❌ Corrigir TelaGeneratorServiceImpl sem ver o erro
❌ Tentar 3 vezes sem checar o stacktrace
```

**CORRETO:**
```
✅ PASSO 1: Pedir ao usuário o body da resposta 500 (DevTools → Network → Response)
   OU ler o console Spring: procurar "Erro não tratado:" no log
   
✅ PASSO 2: Agent(debugger, "stacktrace: TransientPropertyValueException em FormaPagamento.save") 
         || Agent(backend-spring, "ler FormaPagamentoServiceImpl + entidade FormaPagamento")
         
✅ PASSO 3: Causa confirmada → empresa é transient no persist()

✅ PASSO 4: Agent(backend-spring, "fix: em.getReference(Empresa) antes do save()")

✅ PASSO 5: Agent(qa, "validar POST /api/forma_pagamento com empresa{id:1}")
```

### Bug visual: dropdown mostra IDs em vez de labels

**CORRETO:**
```
✅ PASSO 1: Agent(frontend-flutter, "ler generic_grid_card.dart — como dropdown monta options")
         || Agent(backend-spring, "ler TelaGeneratorServiceImpl — como status é mapeado")
         
✅ PASSO 2: Causa confirmada → COLUMN_ENUM_MAP mapeia 'status' para StatusContaEnum (IDs 13-16)
           dropdownDisplayField 'label' → sobrescrito para 'nome' → EnumValue não tem 'nome' → mostra ID

✅ PASSO 3: Fix: endpoint próprio /status-options + override TelaGenerator + migration reset tela
```

---

## Anti-padrões Proibidos

| Proibido | Correto |
|----------|---------|
| Aplicar fix baseado em suposição | Ler o arquivo/log antes |
| Corrigir o mesmo bug mais de 2 vezes | Confirmar causa raiz com especialista |
| "Provavelmente é X" sem verificar | "Li o arquivo, é X na linha Y" |
| Fazer fix e dizer "testado" sem testar | Chamar qa para validar |
| Ignorar o corpo da resposta HTTP | Sempre pedir/checar o response body |

---

Agora processe a demanda do usuário seguindo este fluxo.
